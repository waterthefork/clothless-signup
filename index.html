<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Rubik+Puddles&display=swap"
      rel="stylesheet"
    />

    <title>Login - CLOTHLESS</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="navbar">
      <h2 class="logo"><a href="#">CLOTHLESS</a></h2>
      <ul class="nav-links">
        <li>
          <a
            href="https://waterthefork.github.io/clothless-landing-page/#gallery"
            target="_blank"
            >Gallery</a
          >
        </li>
        <li>
          <a href="https://github.com/waterthefork" target="_blank">Github</a>
        </li>
      </ul>
    </header>

    <main class="container">
      <div class="image-container">
        <img src="images/andrej-lisakov-Yy4sN6QzboU-unsplash.jpg" alt="" />
      </div>

      <div class="content-container">
        <div class="form-container">
          <h1>Join CLOTHLESS</h1>
          <p class="subtitle">World's First invisible fashion brand.</p>

          <form action="">
            <div class="form-row">
              <div class="form-group">
                <label for="first-name">First Name</label>

                <input type="text" id="first-name" name="first-name" required />
              </div>

              <div class="form-group">
                <label for="last-name">Last Name</label>

                <input type="text" id="last-name" name="last-name" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="email">Email</label>

                <input type="email" id="email" name="email" required />
              </div>

              <div class="form-group">
                <label for="phone-number">Phone Number</label>

                <input
                  type="tel"
                  id="phone-number"
                  name="phone-number"
                  required
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="dob">Date of Birth</label>

                <input type="date" id="dob" name="dob" required />
              </div>

              <div class="form-group">
                <label for="sex">Sex</label>

                <select id="sex" name="sex" required>
                  <option value="">Select</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="other">Other</option>
                </select>
              </div>

              <div class="form-group">
                <label for="password">Password</label>
                <input
                  type="password"
                  name="password"
                  id="password"
                  required
                  minlength="8"
                />
              </div>
            </div>

            <div class="button-group">
              <button type="submit" class="btn">Submit</button>
              <button type="reset" class="btn">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
